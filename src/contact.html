<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIAN</title>
    <link rel="stylesheet" href="css/bootstrap-reboot.min.css">
    <link rel="stylesheet" href="css/bootstrap-grid.min.css">
    <link rel="stylesheet" href="css/font.css">
    <link rel="stylesheet" href="css/font_1.css">
    <link rel="stylesheet" href="css/style.min.css">
</head>
<body>
    <a href="#" class="up"><img src="icons/home/up.png" alt="up"></a>
    <header class="header">
        <div class="container">
            <div class="row">
                <div class="col-md-2">
                        <a href="#" class="header__logo header__logo_main"><img src="icons/home/main_logo.png" alt="logo"></a>
                </div>
                <div class="col-md-7 offset-md-3">
                    <ul class="header__menu">
                        <li class="header__item"><a href="index.html" class="menu__link">HOME</a></li>
                        <li class="header__item"><a href="about.html" class="menu__link">About</a></li>
                        <li class="header__item"><a href="portfolio.html" class="menu__link">Portfolio</a></li>
                        <li class="header__item"><a href="#" class="menu__link">BLOG</a></li>
                        <li class="header__item"><a href="#" class="menu__link  menu__link_selected">Contact</a></li>
                        <a href="#" class="search"><span class="icon-search"></span></a>
                    </ul>
                </div>
            </div>
        </div>
    </header>
    <div class="header-bg header-bg__about">
        <div class="header-bg__title header-bg__title_about">Get in Touch</div>
        <div class="header-bg__subtitle header-bg__subtitle_about">Contact us Today</div>
    </div>
    <section class="info">
        <div class="container">
            <div class="row">
                <div class="col-md-4">
                    <div class="info__office">Office Info</div>
                    <div class="info__descr">People Behind the Success of our Company</div>
                    <div class="info__hours">Office Hours: <span>Mon-Friday 8am - 10pm</span></div>
                    <address class="info__address">Address: <span> Igbalangao, Bugasong, Antique</span></address>
                    <a href="" class="info__tell">Tell: <span>123-456-7890</span></a> 
                    <a href="" class="info__fax">Fax: <span> 123-456-7890</span></a>
                </div>
               <div class="col-md-6">
                   <form class="info-form" action="#">
                       <input name="name" required placeholder="Name" type="text">
                       <input name="email" required placeholder="Email" type="email">
                       <textarea style="resize: none" name="info__text" placeholder="Message" id="info__text"></textarea>
                       <button class="button button_submit" >Send Message</button>
                   </form>
               </div>
            </div>
        </div>
    </section>
    <div class="map">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3026.0569624754885!2d-73.83498438476687!3d40.67271384795531!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c2674340dbd021%3A0x5982f3f892a92c6c!2sResorts%20World%20Casino%20New%20York%20City!5e0!3m2!1sru!2sru!4v1623227535816!5m2!1sru!2sru" width="100%" height="360" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        <div class="map__info"></div>
    </div>
    <script src="js/jquery.validate.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
